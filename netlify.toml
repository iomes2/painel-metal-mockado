[build]
  # Especificar que o build é na pasta frontend
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Variáveis de ambiente para modo demo (sem backend/firebase)
  NEXT_PUBLIC_DEMO_MODE = "true"
  NEXT_PUBLIC_USE_BACKEND = "false"
  NEXT_PUBLIC_API_URL = ""
  # Firebase env vars dummy (para evitar erros de build)
  NEXT_PUBLIC_FIREBASE_API_KEY = "demo-key"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN = "demo.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID = "demo-project"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET = "demo.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID = "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID = "1:000000000000:web:demo"

# Plugin para Next.js no Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers para segurança e cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
